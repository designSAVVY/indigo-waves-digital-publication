    <div id="wrapper">

            <iframe class="left-video" width="100%" src="https://www.youtube-nocookie.com/embed/WaPeBcO3c8s?si=Mrw-4zGIOH21-Oxu" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="right-video" width="100%" src="https://www.youtube-nocookie.com/embed/bIEO_IbX4oI?si=q3eTnIqjCy56mcuj" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="left-video" width="100%" src="https://www.youtube-nocookie.com/embed/0X7_C2Z6HOQ?si=rIBY2K_bvP-hKHhQ" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="right-video" width="100%" src="https://www.youtube-nocookie.com/embed/iYtrdXfAiuo?si=JaxhLQqEiUhdtOca" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="left-video" width="100%" src="https://www.youtube-nocookie.com/embed/BsSXz45bzV4?si=UbcTXGyO1z9jifng" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="right-video" width="100%" src="https://www.youtube-nocookie.com/embed/rfD1A9m2Knk?si=xYwwZU9PlvCGt6KK" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="left-video" width="100%" src="https://www.youtube-nocookie.com/embed/agmJZbmAVhU?si=3JfV_E59B85MP7qR" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <iframe class="right-video" width="100%" src="https://www.youtube-nocookie.com/embed/VuLmdqGgSh8?si=hBXakqwFIaci4mkS" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const iframes = document.querySelectorAll('#watch-container iframe');
        const body = document.querySelector('body');

        iframes.forEach(iframe => {
            iframe.addEventListener('mouseenter', () => {
                body.classList.add('darken-background');
            });

            iframe.addEventListener('mouseleave', () => {
                body.classList.remove('darken-background');
            });
        });
    });
    </script>

</body>
</html>

<style>
    /* Create a pseudo-element that darkens the background */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0);
        pointer-events: none; /* Allow interaction with elements below */
        transition: background-color 300ms ease;
        z-index: 1; /* Make sure this is behind the content */
    }

    /* Darkening effect when the iframe is hovered */
    body.darken-background::before {
        background-color: rgba(0, 0, 0, 0.5);
    }

    /* Ensure the video content appears above the dark background */
    #watch-container {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10vh;
        margin-top: 20vh;
        padding: 3em;
    }

    #watch-container iframe {
        aspect-ratio: 16 / 9;
        width: 75%;
        transition: width 300ms;
    }

    #watch-container iframe:hover {
        width: 100%;
    }

    .right-video {
        justify-self: end;
    }

    @media (max-width: 960px) {
        .left-video,
        .right-video {
            width: 100%;
        }
    }
</style>
