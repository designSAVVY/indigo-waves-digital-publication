<style>
    #watch-container{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10vh;
        margin-top: 20vh;
        padding: 3em;
    }

    #watch-container iframe{
        aspect-ratio: 16 / 9;
    }

    .left-video{
        grid-column: 1 / 3;
    }

    .right-video{
        grid-column: 2 / 4;
    }

    .full-width {
            grid-column: 1 / 4 !important;
        }
    
    @media(max-width: 960px) {

        .left-video{
            grid-column: 1 / 4;
        }

        .right-video{
            grid-column: 1 / 4;
        }

    }
</style>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iframes = document.querySelectorAll('iframe');

            iframes.forEach(iframe => {
                // Enlarge the video when user interacts (focus)
                iframe.addEventListener('mouseenter', () => {
                    iframes.forEach(el => el.classList.remove('full-width')); // Reset all videos
                    iframe.classList.add('full-width'); // Enlarge the hovered/playing video
                });

                // Reset when the mouse leaves the video
                iframe.addEventListener('mouseleave', () => {
                    iframe.classList.remove('full-width'); // Reset when the user stops interacting
                });
            });
        });
    </script>
