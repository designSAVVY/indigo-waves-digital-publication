<style>
    #watch-container{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10vh;
        margin-top: 20vh;
        padding: 3em;
    }

    #watch-container iframe{
        min-height: 400px;
        height: 10vh;
        max-height: 720px;
    }

    .left-video{
        grid-column: 1 / 3;
    }

    .right-video{
        grid-column: 2 / 4;
    }

    .full-width {
            grid-column: 1 / 4 !important;
        }
    
    @media(max-width: 960px) {

        .left-video{
            grid-column: 1 / 4;
        }

        .right-video{
            grid-column: 1 / 4;
        }

    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const iframes = document.querySelectorAll('iframe');
        let currentPlaying = null;

        iframes.forEach(iframe => {
            iframe.addEventListener('play', () => {
                // Stop any currently playing video
                if (currentPlaying && currentPlaying !== iframe) {
                    currentPlaying.src = currentPlaying.src; // Reset the iframe
                }

                // Set the current iframe as playing
                currentPlaying = iframe;

                // Apply full-width styling
                iframes.forEach(el => el.classList.remove('full-width')); // Reset other videos
                iframe.classList.add('full-width');
            });
        });

        // Listener for YouTube iframe events (since play event doesn't trigger on iframe)
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = () => {
            iframes.forEach((iframe, index) => {
                new YT.Player(iframe, {
                    events: {
                        'onStateChange': function(event) {
                            if (event.data == YT.PlayerState.PLAYING) {
                                if (currentPlaying && currentPlaying !== iframe) {
                                    currentPlaying.src = currentPlaying.src; // Reset the current playing iframe
                                }
                                currentPlaying = iframe;
                                iframes.forEach(el => el.classList.remove('full-width'));
                                iframe.classList.add('full-width');
                            }
                        }
                    }
                });
            });
        };
    });
</script>
